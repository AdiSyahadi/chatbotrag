{% extends "base.html" %}
{% set active_page = "chat" %}

{% block title %}Chat — RAG Chatbot{% endblock %}

{% block content %}
<div class="card chat-container">
    <div class="card-header">
        <i class="bi bi-chat-dots"></i>
        Chat dengan Dokumen
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="empty-state" id="emptyState">
            <i class="bi bi-chat-square-text"></i>
            <p>Mulai bertanya tentang dokumen Anda.</p>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="questionInput" placeholder="Ketik pertanyaan Anda..." autocomplete="off">
        <button class="btn btn-primary" id="sendBtn" onclick="sendQuestion()">
            <i class="bi bi-send"></i>
            Kirim
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const chatMessages = document.getElementById('chatMessages');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const emptyState = document.getElementById('emptyState');
    const sessionId = crypto.randomUUID();

    questionInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendQuestion();
        }
    });

    function addMessage(content, type, sources, meta) {
        if (emptyState) emptyState.style.display = 'none';

        const div = document.createElement('div');
        div.className = 'chat-message ' + type;

        let rendered = type === 'bot' ? renderMarkdown(content) : escapeHtml(content);
        let html = '<div>' + rendered + '</div>';

        div.innerHTML = html;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addLoading() {
        const div = document.createElement('div');
        div.className = 'chat-message bot';
        div.id = 'loadingMsg';
        div.innerHTML = '<span class="loading-text"><span class="spinner"></span> Lagi nyiapin jawaban...</span>';
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeLoading() {
        const el = document.getElementById('loadingMsg');
        if (el) el.remove();
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question) return;

        questionInput.value = '';
        addMessage(question, 'user');
        addLoading();
        sendBtn.disabled = true;

        try {
            const resp = await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question, session_id: sessionId }),
            });
            const data = await resp.json();
            removeLoading();

            if (!resp.ok) {
                addMessage(data.error || 'Terjadi kesalahan.', 'bot');
            } else {
                addMessage(data.answer, 'bot', data.sources, {
                    similarity_score: data.similarity_score,
                    response_time: data.response_time,
                });
            }
        } catch (err) {
            removeLoading();
            addMessage('Gagal terhubung ke server.', 'bot');
        }

        sendBtn.disabled = false;
        questionInput.focus();
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function renderMarkdown(text) {
        let html = escapeHtml(text);
        // Bold: **text**
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        // Italic: *text*
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        // Inline code: `text`
        html = html.replace(/`(.+?)`/g, '<code>$1</code>');
        // Line breaks
        html = html.replace(/\n/g, '<br>');
        return html;
    }
</script>
{% endblock %}
